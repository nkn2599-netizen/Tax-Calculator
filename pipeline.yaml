apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  workspaces:
    - name: shared-data
  tasks:
    - name: npm-install
      taskRef:
        name: npm
      workspaces:
        - name: source
          workspace: shared-data
    - name: run-tests
      taskRef:
        name: jasmine
      runAfter:
        - npm-install
      workspaces:
        - name: source
          workspace: shared-data
    - name: build-image
      taskRef:
        name: build
      runAfter:
        - run-tests
      workspaces:
        - name: source
          workspace: shared-data
